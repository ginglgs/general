<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prayer Requests</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Prayer Requests">

  <link rel="apple-touch-icon" href="appicon.png">
  <link rel="icon" type="image/png" href="appicon.png">

    <script>
      setTimeout(function () {
      window.location.href = "https://script.google.com/macros/s/AKfycbwRRZXycC0rD2wXg0IXV9ChW67sBsU64viJ9g7tFeRxhQ0LeaLCmKe7hbtIBg9-D_UK/exec";
      }, 2000);
    </script>
  
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f5f5f5;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:16px;
      box-shadow:0 4px 15px rgba(0,0,0,.15);
      text-align:center;
      max-width:320px;
    }

    .spinner{
      width:40px;
      height:40px;
      margin:20px auto;
      border:5px solid #ddd;
      border-top:5px solid #1a73e8;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Creating Prayer Request...</h2>
    <div class="spinner"></div>
      <p>Add this page to your Home Screen for the Prayer Requests app.</p>
      <p>The document will open automatically in 1 second.</p>
  </div>
</body>
</html>
